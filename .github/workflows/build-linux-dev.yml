name: Linux Dev Build

on:
  workflow_dispatch:
  push:
    branches:
      - 'feat/15-linux-build'
    paths:
      - 'src-tauri/**'
      - 'scripts/**'
      - '.github/workflows/build-linux-dev.yml'

permissions:
  contents: write

env:
  RUST_BACKTRACE: "1"

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Diagnose environment
        run: |
          echo "::group::System info"
          uname -a
          lsb_release -a 2>/dev/null || cat /etc/os-release
          echo "Arch: $(uname -m)"
          echo "glibc: $(ldd --version | head -1)"
          echo "Runner: $RUNNER_OS / $RUNNER_ARCH"
          echo "::endgroup::"

          echo "::group::Tool versions"
          rustc --version && cargo --version
          node --version && npm --version
          python3 --version
          echo "::endgroup::"

          echo "::group::Disk space"
          df -h /
          echo "::endgroup::"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            python3-pip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Generate sdkjs develop scripts
        run: |
          echo "::group::grunt-develop"
          cd src/sdkjs/build
          npm ci
          npx grunt develop --desktop=true
          cd "$GITHUB_WORKSPACE"

          WORD_SCRIPTS="src/sdkjs/develop/sdkjs/word/scripts.js"
          if ! grep -q 'word/document/editor\.js' "$WORD_SCRIPTS" 2>/dev/null; then
            echo "Patching word/scripts.js with editor.js..."
            sed -i 's/\];$/,\n\t"..\/..\/..\/..\/sdkjs\/word\/document\/editor.js"\n];/' "$WORD_SCRIPTS"
          fi
          echo "::endgroup::"

          echo "::group::Verify develop scripts"
          for mod in word cell slide; do
            f="src/sdkjs/develop/sdkjs/$mod/scripts.js"
            if [ -f "$f" ]; then
              echo "$f: $(wc -l < "$f") lines"
            else
              echo "WARNING: $f not found"
            fi
          done
          echo "::endgroup::"

      - name: Prepare fonts and AllFonts.js
        run: |
          echo "::group::prepare-fonts"
          pip3 install Pillow --quiet --break-system-packages || pip3 install Pillow --quiet
          chmod +x scripts/prepare-fonts.sh
          bash scripts/prepare-fonts.sh
          echo "::endgroup::"

          echo "::group::Verify fonts"
          echo "Font files: $(ls src/fonts/*.ttf 2>/dev/null | wc -l)"
          ls -la src/fonts/*.ttf 2>/dev/null | head -5
          if [ -f "src/sdkjs/common/AllFonts.js" ]; then
            echo "AllFonts.js: $(wc -l < src/sdkjs/common/AllFonts.js) lines"
          else
            echo "WARNING: AllFonts.js not generated"
          fi
          echo "::endgroup::"

          echo "::group::Copy fonts to binaries for bundling"
          mkdir -p src-tauri/binaries/fonts
          cp src/fonts/*.ttf src-tauri/binaries/fonts/
          cp src/sdkjs/common/AllFonts.js src-tauri/binaries/AllFonts.js
          echo "Fonts copied: $(ls src-tauri/binaries/fonts/*.ttf | wc -l)"
          echo "::endgroup::"

      - name: Generate sdk-word-bundle.js for DoctRenderer
        run: |
          chmod +x scripts/generate-sdk-bundle.sh
          bash scripts/generate-sdk-bundle.sh

      - name: Prepare DoctRenderer directory structure
        run: |
          chmod +x scripts/prepare-doctrenderer.sh
          bash scripts/prepare-doctrenderer.sh

      - name: Generate Linux icons
        run: |
          echo "::group::generate-icons"
          chmod +x scripts/generate-icons.sh
          bash scripts/generate-icons.sh
          echo "::endgroup::"

          echo "::group::Verify icons"
          ls -la src-tauri/icons/
          echo "::endgroup::"

      - name: Download x2t Linux binaries
        run: |
          chmod +x scripts/get-x2t-ci.sh
          bash scripts/get-x2t-ci.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy x2t to binaries for DoctRenderer PDF path
        run: |
          cp "src-tauri/binaries/x2t-${{ matrix.target }}" "src-tauri/binaries/x2t"
          echo "x2t resource copy created ($(wc -c < src-tauri/binaries/x2t) bytes)"

      - name: Verify x2t binary
        run: |
          echo "::group::x2t binary info"
          X2T="src-tauri/binaries/x2t-${{ matrix.target }}"
          if [ -f "$X2T" ]; then
            file "$X2T"
            echo "Shared library dependencies:"
            ldd "$X2T" || true
            echo "With LD_LIBRARY_PATH:"
            LD_LIBRARY_PATH="src-tauri/binaries" ldd "$X2T" || true
          else
            echo "WARNING: x2t binary not found at $X2T"
            ls -la src-tauri/binaries/x2t* 2>/dev/null || echo "No x2t files found"
          fi
          echo "::endgroup::"

      - name: Stage frontend distribution
        run: |
          echo "::group::prepare-dist"
          chmod +x scripts/prepare-dist.sh
          bash scripts/prepare-dist.sh
          echo "::endgroup::"

          echo "::group::Verify dist"
          echo "File count: $(find src-dist -type f | wc -l)"
          echo "Total size: $(du -sh src-dist | cut -f1)"
          find src-dist -type f | head -30
          echo "::endgroup::"

          LOG="/tmp/euro-office-lite/prepare-dist.log"
          if [ -f "$LOG" ]; then
            echo "::group::prepare-dist log"
            cat "$LOG"
            echo "::endgroup::"
          fi

      - name: Build Tauri app
        run: |
          set -o pipefail
          echo "Building for ${{ matrix.target }}..."
          npx tauri build \
            --target ${{ matrix.target }} \
            --config '{"bundle":{"targets":["deb"],"resources":["binaries/*.so","binaries/*.so.*","binaries/*.config","binaries/*.dat","binaries/*.js","binaries/x2t","binaries/fonts/*","binaries/editors/**","templates/*"]}}' \
            2>&1 | tee /tmp/tauri-build.log

          echo "::group::Build output"
          DEB_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/deb"
          if [ -d "$DEB_DIR" ]; then
            echo "Deb output:"
            ls -lh "$DEB_DIR/"
          else
            echo "No deb directory found at $DEB_DIR"
          fi
          echo "::endgroup::"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-linux-${{ matrix.target }}
          path: |
            /tmp/tauri-build.log
            /tmp/euro-office-lite/*.log
