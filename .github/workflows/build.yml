name: Build & Release

on:
  workflow_dispatch:
    inputs:
      frontend_only:
        description: Build and validate only the shared production frontend
        required: true
        default: true
        type: boolean
  push:
    branches:
      - feat/36-linux-clipboard-fixes
    tags:
      - "v*"

permissions:
  contents: read

env:
  RUST_BACKTRACE: "1"

concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build-frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            src/sdkjs/build/package-lock.json

      - name: Setup Java for Closure Compiler
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install frontend build dependencies
        run: |
          npm ci
          npm ci --prefix src/sdkjs/build

      - name: Prepare fonts
        run: |
          pip3 install Pillow --quiet --break-system-packages || pip3 install Pillow --quiet
          chmod +x scripts/prepare-fonts.sh
          bash scripts/prepare-fonts.sh

      - name: Build and validate production frontend
        run: |
          set -o pipefail
          npm run build:frontend:prod 2>&1 | tee /tmp/frontend-build.log

      - name: Collect frontend diagnostics
        if: always()
        run: |
          {
            echo "event=${{ github.event_name }} ref=${{ github.ref }} sha=${{ github.sha }}"
            node --version
            npm --version
            java -version
            git submodule status src/sdkjs src/web-apps
            if [ -d src-dist ]; then
              echo "File count: $(find src-dist -type f | wc -l)"
              echo "Total size: $(du -sh src-dist | cut -f1)"
              echo "Largest production assets:"
              find src-dist -type f -printf '%s %p\n' | sort -nr | head -30
            else
              echo "src-dist was not produced"
            fi
          } 2>&1 | tee /tmp/frontend-diagnostics.log

      - name: Upload production frontend
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: production-frontend
          path: src-dist/
          if-no-files-found: error
          retention-days: 1

      - name: Upload frontend diagnostics
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: frontend-diagnostics-${{ github.run_attempt }}
          path: |
            /tmp/frontend-build.log
            /tmp/frontend-diagnostics.log
          if-no-files-found: warn
          retention-days: 7

  build-windows:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.frontend_only }}
    needs: build-frontend
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-pc-windows-msvc, aarch64-pc-windows-msvc]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Install npm dependencies
        run: npm ci --omit=dev

      - name: Download production frontend
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: production-frontend
          path: src-dist/

      - name: Validate production frontend
        run: npm run validate:frontend:prod

      - name: Download x2t binaries
        shell: pwsh
        run: .\scripts\get-x2t-ci.ps1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare DoctRenderer resources
        shell: bash
        run: |
          set -o pipefail
          echo "::group::Copy fonts to binaries"
          mkdir -p src-tauri/binaries/fonts
          cp src/fonts/*.ttf src-tauri/binaries/fonts/
          cp src-dist/sdkjs/common/AllFonts.js src-tauri/binaries/AllFonts.js
          echo "Fonts copied: $(ls src-tauri/binaries/fonts/*.ttf | wc -l)"
          echo "::endgroup::"

          echo "::group::Compile sdkjs for DoctRenderer"
          chmod +x scripts/compile-doctrenderer-sdkjs.sh
          export DOCTRENDERER_STAGING="$RUNNER_TEMP/doctrenderer-sdkjs"
          export ALLFONTS_SOURCE="$GITHUB_WORKSPACE/src-dist/sdkjs/common/AllFonts.js"
          bash scripts/compile-doctrenderer-sdkjs.sh 2>&1 | tee "$RUNNER_TEMP/doctrenderer-build.log"
          echo "::endgroup::"
          echo "::group::Create DoctRenderer directory structure"
          DOCTRENDERER_SDKJS="$DOCTRENDERER_STAGING" bash scripts/prepare-doctrenderer.sh
          echo "::endgroup::"

      - name: Rename x2t sidecar for target
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $bin = "src-tauri\binaries"
          Copy-Item "$bin\x2t-x86_64-pc-windows-msvc.exe" "$bin\x2t-aarch64-pc-windows-msvc.exe"
          Remove-Item "$bin\x2t-x86_64-pc-windows-msvc.exe"

      - name: Build Tauri installer
        shell: pwsh
        run: |
          echo "::group::tauri-build"
          npx tauri build --target ${{ matrix.target }} 2>&1 | Tee-Object -FilePath (Join-Path $env:TEMP "tauri-build.log")
          echo "::endgroup::"

      - name: Show installer info
        shell: pwsh
        run: |
          $nsisDir = "src-tauri\target\${{ matrix.target }}\release\bundle\nsis"
          if (Test-Path $nsisDir) {
            Get-ChildItem $nsisDir -Recurse | Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,2)}}
          } else {
            Write-Host "NSIS output directory not found at $nsisDir"
            Get-ChildItem "src-tauri\target" -Directory | Select-Object Name
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installer-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-logs-${{ matrix.target }}
          path: |
            ${{ runner.temp }}/doctrenderer-build.log
            ${{ runner.temp }}/tauri-build.log

  build-macos:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.frontend_only }}
    needs: build-frontend
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Install npm dependencies
        run: npm ci --omit=dev

      - name: Download production frontend
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: production-frontend
          path: src-dist/

      - name: Validate production frontend
        run: npm run validate:frontend:prod

      - name: Generate macOS icons
        run: |
          echo "::group::generate-icons"
          python3 -m pip install Pillow --quiet --break-system-packages || python3 -m pip install Pillow --quiet
          chmod +x scripts/generate-icons.sh
          bash scripts/generate-icons.sh
          echo "::endgroup::"

      - name: Download x2t macOS binaries
        run: |
          chmod +x scripts/get-x2t-ci.sh
          bash scripts/get-x2t-ci.sh ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix x2t binary (rpath + ad-hoc re-sign)
        run: |
          echo "::group::Patch x2t rpath and re-sign"
          X2T="src-tauri/binaries/x2t-${{ matrix.target }}"
          if [ -f "$X2T" ]; then
            install_name_tool -add_rpath "@executable_path/../Resources/binaries" "$X2T" 2>/dev/null || true
            codesign --force --sign - "$X2T"
            echo "Updated rpaths:"
            otool -l "$X2T" | grep -A2 LC_RPATH
          fi
          echo "::endgroup::"

      - name: Copy x2t to binaries for DoctRenderer PDF path
        run: |
          cp "src-tauri/binaries/x2t-${{ matrix.target }}" "src-tauri/binaries/x2t"
          echo "x2t resource copy created ($(wc -c < src-tauri/binaries/x2t) bytes)"

      - name: Prepare DoctRenderer resources
        run: |
          set -o pipefail
          echo "::group::Copy fonts to binaries"
          mkdir -p src-tauri/binaries/fonts
          cp src/fonts/*.ttf src-tauri/binaries/fonts/
          cp src-dist/sdkjs/common/AllFonts.js src-tauri/binaries/AllFonts.js
          echo "Fonts copied: $(ls src-tauri/binaries/fonts/*.ttf | wc -l)"
          echo "::endgroup::"

          echo "::group::Compile sdkjs for DoctRenderer"
          chmod +x scripts/compile-doctrenderer-sdkjs.sh
          export DOCTRENDERER_STAGING="$RUNNER_TEMP/doctrenderer-sdkjs"
          export ALLFONTS_SOURCE="$GITHUB_WORKSPACE/src-dist/sdkjs/common/AllFonts.js"
          bash scripts/compile-doctrenderer-sdkjs.sh 2>&1 | tee /tmp/doctrenderer-build.log
          echo "::endgroup::"
          echo "::group::Create DoctRenderer directory structure"
          chmod +x scripts/prepare-doctrenderer.sh
          DOCTRENDERER_SDKJS="$DOCTRENDERER_STAGING" bash scripts/prepare-doctrenderer.sh
          echo "::endgroup::"

      - name: Build Tauri app
        run: |
          set -o pipefail
          npx tauri build \
            --target ${{ matrix.target }} \
            --config '{"bundle":{"targets":["app","dmg"],"icon":["icons/icon.icns","icons/icon.png","icons/128x128.png","icons/32x32.png"],"resources":["binaries/*.dylib","binaries/*.config","binaries/*.js","binaries/x2t","binaries/fonts/*","editors/sdkjs/word/*","editors/sdkjs/cell/*","editors/sdkjs/slide/*","editors/sdkjs/common/Native/*","editors/sdkjs/common/AllFonts.js","editors/sdkjs/common/libfont/engine/*","editors/web-apps/vendor/xregexp/*","templates/*"]}}' \
            2>&1 | tee /tmp/tauri-build.log

      - name: Sign and notarize macOS app
        # Final safety bound for signing and both Apple notarization submissions.
        # Each notarytool process also has its own watchdog below.
        timeout-minutes: 75
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # Not used by the script (identity is derived from keychain), but referencing it
          # makes GitHub mask the certificate name in logs (Authority= lines in verify step)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No Apple certificate configured, skipping code signing"
            exit 0
          fi

          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Euro-Office-Lite.app"
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"

          submit_for_notarization() {
            local artifact="$1" label="$2" log_file="$3" max_attempts="$4"
            local attempt=1 watchdog_seconds=1920
            while [ "$attempt" -le "$max_attempts" ]; do
              : > "$log_file"
              echo "::notice::Submitting $label attempt $attempt of $max_attempts"
              echo "Artifact: $artifact ($(du -h "$artifact" | cut -f1))"
              date -u +Started:%Y-%m-%dT%H:%M:%SZ
              xcrun notarytool submit "$artifact" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" --wait --timeout 1800 --verbose > "$log_file" 2>&1 &
              local submit_pid=$!
              tail -n +1 -f "$log_file" &
              local tail_pid=$! started_at=$SECONDS timed_out=false
              while kill -0 "$submit_pid" 2>/dev/null; do
                if [ $((SECONDS - started_at)) -ge "$watchdog_seconds" ]; then
                  timed_out=true
                  echo ::warning::$label-exceeded-$watchdog_seconds-seconds
                  kill -TERM "$submit_pid" 2>/dev/null || true
                  sleep 10
                  kill -KILL "$submit_pid" 2>/dev/null || true
                  break
                fi
                sleep 15
              done
              set +e
              wait "$submit_pid"
              local exit_code=$?
              set -e
              sleep 1
              kill "$tail_pid" 2>/dev/null || true
              wait "$tail_pid" 2>/dev/null || true

              local submission_id
              submission_id=$(grep -oE '[0-9a-f]{8}-[0-9a-f-]{28}' "$log_file" | head -1 || true)
              date -u +Finished:%Y-%m-%dT%H:%M:%SZ
              echo exit=$exit_code timed_out=$timed_out submission_id=${submission_id:-none}
              if grep -qi 'status: Accepted' "$log_file"; then
                echo $label-notarization-accepted
                return 0
              fi
              if [ -n "$submission_id" ]; then
                echo ::error::$label-submission-$submission_id-did-not-complete
                return 1
              fi
              if [ "$attempt" -lt "$max_attempts" ]; then
                echo ::warning::$label-failed-before-returning-an-ID-retrying
                sleep 20
              fi
              attempt=$((attempt + 1))
            done
            echo ::error::$label-failed-after-$max_attempts-attempts-without-an-ID
            return 1
          }

          # --- Import certificate into temporary keychain ---
          echo "::group::Import certificate"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          trap 'security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true' EXIT
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          rm "$RUNNER_TEMP/certificate.p12"

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')


          APPLE_SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | sed -n 's/.*"\(.*\)".*/\1/p' | head -1)
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "::error::No codesigning identity found in temporary keychain"
            exit 1
          fi
          echo "Certificate imported"
          echo "::endgroup::"

          # --- Sign all Mach-O binaries in the .app bundle ---
          echo "::group::Sign binaries"
          SIGNED_COUNT=0
          while IFS= read -r -d '' f; do
            if file "$f" | grep -qE "Mach-O"; then
              codesign --force --sign "$APPLE_SIGNING_IDENTITY" --options runtime --timestamp "$f"
              SIGNED_COUNT=$((SIGNED_COUNT + 1))
              echo "  Signed: ${f#$APP/}"
            fi
          done < <(find "$APP/Contents" -type f -print0 2>/dev/null)

          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --options runtime --timestamp "$APP"
          SIGNED_COUNT=$((SIGNED_COUNT + 1))
          echo "Signed $SIGNED_COUNT items total (nested binaries + .app bundle)"
          echo "::endgroup::"

          # --- Verify signature before notarization ---
          echo "::group::Pre-notarization verification"
          codesign --verify --deep --strict "$APP" 2>&1
          echo "Signature verification passed"
          echo "::endgroup::"

          # --- Notarize ---
          echo "::group::Notarize"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/app-notarize.zip"
          submit_for_notarization \
            "$RUNNER_TEMP/app-notarize.zip" \
            macOS-app \
            "$RUNNER_TEMP/notary-app-${{ matrix.target }}.log" \
            1
          rm "$RUNNER_TEMP/app-notarize.zip"
          echo "::endgroup::"

          # --- Staple ---
          echo "::group::Staple"
          xcrun stapler staple "$APP"
          echo "::endgroup::"

          # --- Recreate DMG with signed+notarized .app ---
          echo "::group::Recreate DMG"
          rm -f "$DMG_DIR"/*.dmg

          DMG_STAGING="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: "\(.*\)".*/\1/')
          ARCH=$(echo "${{ matrix.target }}" | cut -d'-' -f1)
          DMG_PATH="$DMG_DIR/Euro-Office-Lite_${VERSION}_${ARCH}.dmg"

          hdiutil create -volname "Euro-Office Lite" -srcfolder "$DMG_STAGING" -ov -format UDZO "$DMG_PATH"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp "$DMG_PATH"

          submit_for_notarization \
            "$DMG_PATH" \
            macOS-DMG \
            "$RUNNER_TEMP/notary-dmg-${{ matrix.target }}.log" \
            2

          xcrun stapler staple "$DMG_PATH"

          rm -rf "$DMG_STAGING"
          echo "DMG created: $(basename "$DMG_PATH") ($(du -h "$DMG_PATH" | cut -f1))"
          echo "::endgroup::"

      - name: Verify code signature
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No signing configured, skipping verification"
            exit 0
          fi

          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Euro-Office-Lite.app"
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"

          echo "::group::Signature details"
          codesign -dv --verbose=4 "$APP" 2>&1
          echo "::endgroup::"

          echo "::group::Deep signature verification"
          codesign --verify --deep --strict "$APP" 2>&1
          echo "::endgroup::"

          echo "::group::Gatekeeper assessment"
          spctl -a -t exec -vv "$APP" 2>&1
          echo "::endgroup::"

          echo "::group::Staple validation (.app)"
          xcrun stapler validate "$APP" 2>&1
          echo "::endgroup::"

          DMG=$(find "$DMG_DIR" -name '*.dmg' -print -quit 2>/dev/null)
          if [ -n "$DMG" ]; then
            echo "::group::Staple validation (.dmg)"
            xcrun stapler validate "$DMG" 2>&1
            echo "::endgroup::"
          fi

          echo "::group::All Mach-O binaries in bundle"
          find "$APP" -type f -print0 | xargs -0 file | grep "Mach-O" | while IFS=: read -r path _; do
            sig=$(codesign -dv "$path" 2>&1 | grep "Authority=" | head -1)
            echo "  ${path#$APP/}: $sig"
          done
          echo "::endgroup::"

      - name: Show macOS bundle info
        run: |
          BUNDLE="src-tauri/target/${{ matrix.target }}/release/bundle"
          du -sh "$BUNDLE/macos/"*.app 2>/dev/null || true
          ls -lh "$BUNDLE/dmg/"*.dmg 2>/dev/null || true

      - name: Upload DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installer-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-logs-macos-${{ matrix.target }}
          path: |
            /tmp/doctrenderer-build.log
            /tmp/tauri-build.log

  build-linux:
    if: ${{ github.event_name != 'workflow_dispatch' || !inputs.frontend_only }}
    needs: build-frontend
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Diagnose environment
        run: |
          echo "::group::System info"
          uname -a
          lsb_release -a 2>/dev/null || cat /etc/os-release
          echo "Arch: $(uname -m)"
          echo "glibc: $(ldd --version | head -1)"
          echo "::endgroup::"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            python3-pip

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Install npm dependencies
        run: npm ci --omit=dev

      - name: Download production frontend
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: production-frontend
          path: src-dist/

      - name: Validate production frontend
        run: npm run validate:frontend:prod

      - name: Generate Linux icons
        run: |
          echo "::group::generate-icons"
          python3 -m pip install Pillow --quiet --break-system-packages || python3 -m pip install Pillow --quiet
          chmod +x scripts/generate-icons.sh
          bash scripts/generate-icons.sh
          echo "::endgroup::"

      - name: Download x2t Linux binaries
        run: |
          chmod +x scripts/get-x2t-ci.sh
          bash scripts/get-x2t-ci.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy x2t to binaries for DoctRenderer PDF path
        run: |
          cp "src-tauri/binaries/x2t-${{ matrix.target }}" "src-tauri/binaries/x2t"
          echo "x2t resource copy created ($(wc -c < src-tauri/binaries/x2t) bytes)"

      - name: Prepare DoctRenderer resources
        run: |
          set -o pipefail
          echo "::group::Copy fonts to binaries"
          mkdir -p src-tauri/binaries/fonts
          cp src/fonts/*.ttf src-tauri/binaries/fonts/
          cp src-dist/sdkjs/common/AllFonts.js src-tauri/binaries/AllFonts.js
          echo "Fonts copied: $(ls src-tauri/binaries/fonts/*.ttf | wc -l)"
          echo "::endgroup::"

          echo "::group::Compile sdkjs for DoctRenderer"
          chmod +x scripts/compile-doctrenderer-sdkjs.sh
          export DOCTRENDERER_STAGING="$RUNNER_TEMP/doctrenderer-sdkjs"
          export ALLFONTS_SOURCE="$GITHUB_WORKSPACE/src-dist/sdkjs/common/AllFonts.js"
          bash scripts/compile-doctrenderer-sdkjs.sh 2>&1 | tee /tmp/doctrenderer-build.log
          echo "::endgroup::"
          echo "::group::Create DoctRenderer directory structure"
          chmod +x scripts/prepare-doctrenderer.sh
          DOCTRENDERER_SDKJS="$DOCTRENDERER_STAGING" bash scripts/prepare-doctrenderer.sh
          echo "::endgroup::"

      - name: Build Tauri app
        run: |
          set -o pipefail
          npx tauri build \
            --target ${{ matrix.target }} \
            --config '{"bundle":{"targets":["deb"],"icon":["icons/icon.png","icons/128x128.png","icons/128x128@2x.png","icons/32x32.png","icons/256x256.png"],"resources":["binaries/*.so","binaries/*.so.*","binaries/*.config","binaries/*.dat","binaries/*.js","binaries/x2t","binaries/fonts/*","editors/sdkjs/word/*","editors/sdkjs/cell/*","editors/sdkjs/slide/*","editors/sdkjs/common/Native/*","editors/sdkjs/common/AllFonts.js","editors/sdkjs/common/libfont/engine/*","editors/web-apps/vendor/xregexp/*","templates/*"]}}' \
            2>&1 | tee /tmp/tauri-build.log

      - name: Verify packaged Linux PDF conversion
        run: |
          DEB=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/deb" -maxdepth 1 -name '*.deb' -print -quit)
          if [ -z "$DEB" ]; then
            echo "ERROR: No .deb found for PDF smoke test"
            exit 1
          fi

          EXTRACTED="$RUNNER_TEMP/euro-office-lite-deb"
          rm -rf "$EXTRACTED"
          mkdir -p "$EXTRACTED"
          dpkg-deb -x "$DEB" "$EXTRACTED"

          SDK_BUNDLE=$(find "$EXTRACTED" -path '*/editors/sdkjs/word/sdk-all-min.js' -print -quit)
          if [ -z "$SDK_BUNDLE" ]; then
            echo "ERROR: sdk-all-min.js not found in packaged .deb"
            exit 1
          fi
          APP_ROOT=${SDK_BUNDLE%/editors/sdkjs/word/sdk-all-min.js}

          chmod +x scripts/smoke-test-linux-pdf-bundle.sh
          bash scripts/smoke-test-linux-pdf-bundle.sh "$APP_ROOT"

      - name: Show Linux package info
        run: |
          DEB_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/deb"
          ls -lh "$DEB_DIR/"*.deb
          dpkg-deb --info "$DEB_DIR/"*.deb | head -40

      - name: Upload .deb artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installer-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-logs-linux-${{ matrix.target }}
          path: |
            /tmp/doctrenderer-build.log
            /tmp/tauri-build.log

  build-flatpak:
    needs: [build-linux]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download Linux .deb artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: installer-x86_64-unknown-linux-gnu
          path: deb-download/

      - name: Copy .deb to flatpak dir
        run: |
          ls -la deb-download/
          find deb-download -name '*.deb' -exec cp {} flatpak/euro-office-lite.deb \;

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtimes
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtime-gnome-49-builder-${{ runner.os }}

      - name: Install GNOME runtime and SDK
        run: |
          flatpak install -y --noninteractive --user flathub org.gnome.Platform//49 org.gnome.Sdk//49

      - name: Import GPG key
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          echo "${{ secrets.FLATPAK_GPG_KEY }}" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV

      - name: Build Flatpak
        run: |
          set -o pipefail
          cd flatpak
          SIGN_ARGS=()
          if [ -n "${GPG_KEY_ID:-}" ]; then
            SIGN_ARGS+=(--gpg-sign="$GPG_KEY_ID")
          fi
          flatpak-builder --force-clean --user --repo=repo \
            "${SIGN_ARGS[@]}" \
            --disable-updates \
            build-dir org.eurooffice.Lite.yml 2>&1 | tee /tmp/flatpak-build.log

      - name: Update repo metadata
        run: |
          set -o pipefail
          cd flatpak
          SIGN_ARGS=()
          if [ -n "${GPG_KEY_ID:-}" ]; then
            SIGN_ARGS+=(--gpg-sign="$GPG_KEY_ID")
          fi
          flatpak build-update-repo repo \
            "${SIGN_ARGS[@]}" \
            --generate-static-deltas \
            --title="Euro-Office Lite" 2>&1 | tee -a /tmp/flatpak-build.log

      - name: Export GPG public key
        if: startsWith(github.ref, 'refs/tags/v')
        run: gpg --export --armor $GPG_KEY_ID > flatpak/repo/euro-office-flatpak.gpg

      - name: Build single-file bundle
        run: |
          set -o pipefail
          cd flatpak
          flatpak build-bundle repo \
            euro-office-lite.flatpak \
            org.eurooffice.Lite 2>&1 | tee -a /tmp/flatpak-build.log
          ls -lh euro-office-lite.flatpak

      - name: Upload Flatpak bundle artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installer-flatpak
          path: flatpak/euro-office-lite.flatpak

      - name: Deploy repo to GitHub Pages
        if: startsWith(github.ref, 'refs/tags/v')
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: flatpak/repo
          destination_dir: repo
          keep_files: false

      - name: Upload Flatpak logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-logs-flatpak
          path: /tmp/flatpak-build.log
          if-no-files-found: warn

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux, build-flatpak]
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Download all installers
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: installer-*
          merge-multiple: true
          path: installers

      - name: List installers
        run: ls -lh installers/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: Euro-Office Lite ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            installers/*.exe
            installers/*.dmg
            installers/*.deb
            installers/*.flatpak
