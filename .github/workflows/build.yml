name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  RUST_BACKTRACE: "1"

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc, aarch64-pc-windows-msvc]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Generate sdkjs develop scripts
        shell: pwsh
        run: |
          echo "::group::grunt-develop"
          Push-Location src\sdkjs\build
          npm ci
          npx grunt develop --desktop=true
          Pop-Location
          $wordScripts = "src\sdkjs\develop\sdkjs\word\scripts.js"
          $content = Get-Content $wordScripts -Raw -Encoding utf8
          if ($content -notmatch 'word/document/editor\.js') {
            Write-Host "Patching word/scripts.js with editor.js..."
            $content = $content -replace '\];$', ",`n`t`"../../../../sdkjs/word/document/editor.js`"`n];"
            Set-Content $wordScripts -Value $content -Encoding utf8 -NoNewline
          }
          echo "::endgroup::"

      - name: Prepare fonts and AllFonts.js
        shell: pwsh
        run: |
          echo "::group::prepare-fonts"
          pip install Pillow --quiet
          .\scripts\prepare-fonts.ps1
          echo "::endgroup::"

      - name: Download x2t binaries
        shell: pwsh
        run: .\scripts\get-x2t-ci.ps1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare DoctRenderer resources
        shell: bash
        run: |
          echo "::group::Copy fonts to binaries"
          mkdir -p src-tauri/binaries/fonts
          cp src/fonts/*.ttf src-tauri/binaries/fonts/
          cp src/sdkjs/common/AllFonts.js src-tauri/binaries/AllFonts.js
          echo "Fonts copied: $(ls src-tauri/binaries/fonts/*.ttf | wc -l)"
          echo "::endgroup::"

          echo "::group::Compile sdkjs with Closure Compiler"
          SDKJS_UI_REF=$(git -C src/sdkjs rev-parse HEAD)
          git -C src/sdkjs fetch origin tag v8.2.0.147 --no-tags
          git -C src/sdkjs checkout v8.2.0.147
          cd src/sdkjs/build
          npm ci
          npx grunt compile-word --desktop=true --level=SIMPLE --no-color
          cd "$GITHUB_WORKSPACE"

          COMPILED="src/sdkjs/deploy/sdkjs/word/sdk-all-min.js"
          if [ -f "$COMPILED" ]; then
            echo "sdk-all-min.js: $(wc -c < "$COMPILED") bytes"
            cp "$COMPILED" src-tauri/binaries/sdk-all-min.js
          else
            echo "ERROR: sdk-all-min.js not found"
            exit 1
          fi

          SDK_ALL="src/sdkjs/deploy/sdkjs/word/sdk-all.js"
          if [ -f "$SDK_ALL" ]; then
            echo "sdk-all.js: $(wc -c < "$SDK_ALL") bytes"
            cp "$SDK_ALL" src-tauri/binaries/sdk-all.js
          fi

          DOCTRENDERER_STAGING="$RUNNER_TEMP/doctrenderer-sdkjs"
          mkdir -p "$DOCTRENDERER_STAGING/common/Native"
          mkdir -p "$DOCTRENDERER_STAGING/common/libfont/engine"
          cp src/sdkjs/common/Native/native.js "$DOCTRENDERER_STAGING/common/Native/"
          cp src/sdkjs/common/Native/jquery_native.js "$DOCTRENDERER_STAGING/common/Native/"
          cp src/sdkjs/common/AllFonts.js "$DOCTRENDERER_STAGING/common/"
          cp src/sdkjs/common/libfont/engine/fonts_native.js "$DOCTRENDERER_STAGING/common/libfont/engine/"
          echo "Staged v8.2.0 support files to $DOCTRENDERER_STAGING"

          git -C src/sdkjs checkout "$SDKJS_UI_REF"
          echo "::endgroup::"

          echo "::group::Create DoctRenderer directory structure"
          DOCTRENDERER_SDKJS="$DOCTRENDERER_STAGING" bash scripts/prepare-doctrenderer.sh
          echo "::endgroup::"

      - name: Rename x2t sidecar for target
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $bin = "src-tauri\binaries"
          Copy-Item "$bin\x2t-x86_64-pc-windows-msvc.exe" "$bin\x2t-aarch64-pc-windows-msvc.exe"
          Remove-Item "$bin\x2t-x86_64-pc-windows-msvc.exe"

      - name: Stage frontend distribution
        shell: pwsh
        run: |
          echo "::group::prepare-dist"
          .\scripts\prepare-dist.ps1
          echo "::endgroup::"
          $logFile = Join-Path $env:TEMP "euro-office-lite\prepare-dist.log"
          if (Test-Path $logFile) { Get-Content $logFile }

      - name: Build Tauri installer
        shell: pwsh
        run: |
          echo "::group::tauri-build"
          npx tauri build --target ${{ matrix.target }} 2>&1 | Tee-Object -FilePath (Join-Path $env:TEMP "tauri-build.log")
          echo "::endgroup::"

      - name: Show installer info
        shell: pwsh
        run: |
          $nsisDir = "src-tauri\target\${{ matrix.target }}\release\bundle\nsis"
          if (Test-Path $nsisDir) {
            Get-ChildItem $nsisDir -Recurse | Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,2)}}
          } else {
            Write-Host "NSIS output directory not found at $nsisDir"
            Get-ChildItem "src-tauri\target" -Directory | Select-Object Name
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installer-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-logs-${{ matrix.target }}
          path: |
            ${{ runner.temp }}/euro-office-lite/prepare-dist.log
            ${{ runner.temp }}/tauri-build.log

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin, x86_64-apple-darwin]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Generate sdkjs develop scripts
        run: |
          echo "::group::grunt-develop"
          cd src/sdkjs/build
          npm ci
          npx grunt develop --desktop=true
          cd "$GITHUB_WORKSPACE"

          WORD_SCRIPTS="src/sdkjs/develop/sdkjs/word/scripts.js"
          if ! grep -q 'word/document/editor\.js' "$WORD_SCRIPTS" 2>/dev/null; then
            echo "Patching word/scripts.js with editor.js..."
            sed -i '' 's/\];$/,\n\t"..\/..\/..\/..\/sdkjs\/word\/document\/editor.js"\n];/' "$WORD_SCRIPTS"
          fi
          echo "::endgroup::"

      - name: Prepare fonts and AllFonts.js
        run: |
          echo "::group::prepare-fonts"
          pip3 install Pillow --quiet --break-system-packages || pip3 install Pillow --quiet
          chmod +x scripts/prepare-fonts.sh
          bash scripts/prepare-fonts.sh
          echo "::endgroup::"

      - name: Generate macOS icons
        run: |
          echo "::group::generate-icons"
          chmod +x scripts/generate-icons.sh
          bash scripts/generate-icons.sh
          echo "::endgroup::"

      - name: Download x2t macOS binaries
        run: |
          chmod +x scripts/get-x2t-ci.sh
          bash scripts/get-x2t-ci.sh ${{ matrix.target }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix x2t binary (rpath + ad-hoc re-sign)
        run: |
          echo "::group::Patch x2t rpath and re-sign"
          X2T="src-tauri/binaries/x2t-${{ matrix.target }}"
          if [ -f "$X2T" ]; then
            install_name_tool -add_rpath "@executable_path/../Resources/binaries" "$X2T" 2>/dev/null || true
            codesign --force --sign - "$X2T"
            echo "Updated rpaths:"
            otool -l "$X2T" | grep -A2 LC_RPATH
          fi
          echo "::endgroup::"

      - name: Copy x2t to binaries for DoctRenderer PDF path
        run: |
          cp "src-tauri/binaries/x2t-${{ matrix.target }}" "src-tauri/binaries/x2t"
          echo "x2t resource copy created ($(wc -c < src-tauri/binaries/x2t) bytes)"

      - name: Prepare DoctRenderer resources
        run: |
          echo "::group::Copy fonts to binaries"
          mkdir -p src-tauri/binaries/fonts
          cp src/fonts/*.ttf src-tauri/binaries/fonts/
          cp src/sdkjs/common/AllFonts.js src-tauri/binaries/AllFonts.js
          echo "Fonts copied: $(ls src-tauri/binaries/fonts/*.ttf | wc -l)"
          echo "::endgroup::"

          echo "::group::Compile sdkjs for DoctRenderer"
          SDKJS_UI_REF=$(git -C src/sdkjs rev-parse HEAD)
          DOCTRENDERER_STAGING="$RUNNER_TEMP/doctrenderer-sdkjs"
          restore_sdkjs() {
            git -C src/sdkjs checkout --detach "$SDKJS_UI_REF"
          }
          trap restore_sdkjs EXIT

          rm -f src-tauri/binaries/sdk-all-min.js \
            src-tauri/binaries/sdk-all.js \
            src-tauri/binaries/sdk-word-bundle.js
          rm -rf "$DOCTRENDERER_STAGING"

          git -C src/sdkjs fetch origin tag v8.2.0.147 --no-tags
          git -C src/sdkjs checkout --detach v8.2.0.147
          cd src/sdkjs/build
          npm ci
          npx grunt compile-word --desktop=true --level=SIMPLE --no-color
          cd "$GITHUB_WORKSPACE"

          for bundle in sdk-all-min.js sdk-all.js; do
            source="src/sdkjs/deploy/sdkjs/word/$bundle"
            if [ ! -s "$source" ]; then
              echo "ERROR: Missing compiled DoctRenderer bundle: $source"
              exit 1
            fi
            cp "$source" "src-tauri/binaries/$bundle"
            echo "$bundle: $(wc -c < "$source") bytes"
          done

          mkdir -p "$DOCTRENDERER_STAGING/common/Native"
          mkdir -p "$DOCTRENDERER_STAGING/common/libfont/engine"
          cp src/sdkjs/common/Native/native.js "$DOCTRENDERER_STAGING/common/Native/"
          cp src/sdkjs/common/Native/jquery_native.js "$DOCTRENDERER_STAGING/common/Native/"
          cp src/sdkjs/common/AllFonts.js "$DOCTRENDERER_STAGING/common/"
          cp src/sdkjs/common/libfont/engine/fonts_native.js "$DOCTRENDERER_STAGING/common/libfont/engine/"

          restore_sdkjs
          trap - EXIT
          echo "::endgroup::"

          echo "::group::Create DoctRenderer directory structure"
          chmod +x scripts/prepare-doctrenderer.sh
          DOCTRENDERER_SDKJS="$DOCTRENDERER_STAGING" bash scripts/prepare-doctrenderer.sh
          echo "::endgroup::"

      - name: Stage frontend distribution
        run: |
          echo "::group::prepare-dist"
          chmod +x scripts/prepare-dist.sh
          bash scripts/prepare-dist.sh
          echo "::endgroup::"

      - name: Build Tauri app
        run: |
          set -o pipefail
          npx tauri build \
            --target ${{ matrix.target }} \
            --config '{"bundle":{"targets":["app","dmg"],"icon":["icons/icon.icns","icons/icon.png","icons/128x128.png","icons/32x32.png"],"resources":["binaries/*.dylib","binaries/*.config","binaries/*.js","binaries/x2t","binaries/fonts/*","editors/sdkjs/word/*","editors/sdkjs/common/Native/*","editors/sdkjs/common/AllFonts.js","editors/sdkjs/common/libfont/engine/*","editors/web-apps/vendor/xregexp/*","templates/*"]}}' \
            2>&1 | tee /tmp/tauri-build.log

      - name: Sign and notarize macOS app
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # Not used by the script (identity is derived from keychain), but referencing it
          # makes GitHub mask the certificate name in logs (Authority= lines in verify step)
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No Apple certificate configured, skipping code signing"
            exit 0
          fi

          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Euro-Office-Lite.app"
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"

          # --- Import certificate into temporary keychain ---
          echo "::group::Import certificate"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          trap 'security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true' EXIT
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/certificate.p12"
          security import "$RUNNER_TEMP/certificate.p12" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          rm "$RUNNER_TEMP/certificate.p12"

          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH" > /dev/null
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')


          APPLE_SIGNING_IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | sed -n 's/.*"\(.*\)".*/\1/p' | head -1)
          if [ -z "$APPLE_SIGNING_IDENTITY" ]; then
            echo "::error::No codesigning identity found in temporary keychain"
            exit 1
          fi
          echo "Certificate imported"
          echo "::endgroup::"

          # --- Sign all Mach-O binaries in the .app bundle ---
          echo "::group::Sign binaries"
          SIGNED_COUNT=0
          while IFS= read -r -d '' f; do
            if file "$f" | grep -qE "Mach-O"; then
              codesign --force --sign "$APPLE_SIGNING_IDENTITY" --options runtime --timestamp "$f"
              SIGNED_COUNT=$((SIGNED_COUNT + 1))
              echo "  Signed: ${f#$APP/}"
            fi
          done < <(find "$APP/Contents" -type f -print0 2>/dev/null)

          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --options runtime --timestamp "$APP"
          SIGNED_COUNT=$((SIGNED_COUNT + 1))
          echo "Signed $SIGNED_COUNT items total (nested binaries + .app bundle)"
          echo "::endgroup::"

          # --- Verify signature before notarization ---
          echo "::group::Pre-notarization verification"
          codesign --verify --deep --strict "$APP" 2>&1
          echo "Signature verification passed"
          echo "::endgroup::"

          # --- Notarize ---
          echo "::group::Notarize"
          ditto -c -k --keepParent "$APP" "$RUNNER_TEMP/app-notarize.zip"
          echo "Submitting for notarization ($(du -h "$RUNNER_TEMP/app-notarize.zip" | cut -f1) zip)..."

          NOTARIZE_OUTPUT=$(xcrun notarytool submit "$RUNNER_TEMP/app-notarize.zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 1800 2>&1) || true

          echo "$NOTARIZE_OUTPUT"
          rm "$RUNNER_TEMP/app-notarize.zip"

          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          if echo "$NOTARIZE_OUTPUT" | grep -qi "status: Accepted"; then
            echo "Notarization accepted"
          else
            echo "::error::Notarization failed"
            if [ -n "$SUBMISSION_ID" ]; then
              echo "Fetching notarization log for $SUBMISSION_ID..."
              xcrun notarytool log "$SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" 2>&1 || true
            fi
            exit 1
          fi
          echo "::endgroup::"

          # --- Staple ---
          echo "::group::Staple"
          xcrun stapler staple "$APP"
          echo "::endgroup::"

          # --- Recreate DMG with signed+notarized .app ---
          echo "::group::Recreate DMG"
          rm -f "$DMG_DIR"/*.dmg

          DMG_STAGING="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP" "$DMG_STAGING/"
          ln -s /Applications "$DMG_STAGING/Applications"

          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*: "\(.*\)".*/\1/')
          ARCH=$(echo "${{ matrix.target }}" | cut -d'-' -f1)
          DMG_PATH="$DMG_DIR/Euro-Office-Lite_${VERSION}_${ARCH}.dmg"

          hdiutil create -volname "Euro-Office Lite" -srcfolder "$DMG_STAGING" -ov -format UDZO "$DMG_PATH"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" --timestamp "$DMG_PATH"

          echo "Submitting DMG for notarization..."
          DMG_NOTARIZE_OUTPUT=$(xcrun notarytool submit "$DMG_PATH" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait --timeout 1800 2>&1) || true

          echo "$DMG_NOTARIZE_OUTPUT"

          DMG_SUBMISSION_ID=$(echo "$DMG_NOTARIZE_OUTPUT" | grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)

          if echo "$DMG_NOTARIZE_OUTPUT" | grep -qi "status: Accepted"; then
            echo "DMG notarization accepted"
          else
            echo "::error::DMG notarization failed"
            if [ -n "$DMG_SUBMISSION_ID" ]; then
              echo "Fetching notarization log for $DMG_SUBMISSION_ID..."
              xcrun notarytool log "$DMG_SUBMISSION_ID" \
                --apple-id "$APPLE_ID" \
                --password "$APPLE_PASSWORD" \
                --team-id "$APPLE_TEAM_ID" 2>&1 || true
            fi
            exit 1
          fi

          xcrun stapler staple "$DMG_PATH"

          rm -rf "$DMG_STAGING"
          echo "DMG created: $(basename "$DMG_PATH") ($(du -h "$DMG_PATH" | cut -f1))"
          echo "::endgroup::"

      - name: Verify code signature
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        run: |
          if [ -z "$APPLE_CERTIFICATE" ]; then
            echo "No signing configured, skipping verification"
            exit 0
          fi

          APP="src-tauri/target/${{ matrix.target }}/release/bundle/macos/Euro-Office-Lite.app"
          DMG_DIR="src-tauri/target/${{ matrix.target }}/release/bundle/dmg"

          echo "::group::Signature details"
          codesign -dv --verbose=4 "$APP" 2>&1
          echo "::endgroup::"

          echo "::group::Deep signature verification"
          codesign --verify --deep --strict "$APP" 2>&1
          echo "::endgroup::"

          echo "::group::Gatekeeper assessment"
          spctl -a -t exec -vv "$APP" 2>&1
          echo "::endgroup::"

          echo "::group::Staple validation (.app)"
          xcrun stapler validate "$APP" 2>&1
          echo "::endgroup::"

          DMG=$(find "$DMG_DIR" -name '*.dmg' -print -quit 2>/dev/null)
          if [ -n "$DMG" ]; then
            echo "::group::Staple validation (.dmg)"
            xcrun stapler validate "$DMG" 2>&1
            echo "::endgroup::"
          fi

          echo "::group::All Mach-O binaries in bundle"
          find "$APP" -type f -print0 | xargs -0 file | grep "Mach-O" | while IFS=: read -r path _; do
            sig=$(codesign -dv "$path" 2>&1 | grep "Authority=" | head -1)
            echo "  ${path#$APP/}: $sig"
          done
          echo "::endgroup::"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installer-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-logs-macos-${{ matrix.target }}
          path: /tmp/tauri-build.log

  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          submodules: recursive

      - name: Diagnose environment
        run: |
          echo "::group::System info"
          uname -a
          lsb_release -a 2>/dev/null || cat /etc/os-release
          echo "Arch: $(uname -m)"
          echo "glibc: $(ldd --version | head -1)"
          echo "::endgroup::"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            python3-pip

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Generate sdkjs develop scripts
        run: |
          echo "::group::grunt-develop"
          cd src/sdkjs/build
          npm ci
          npx grunt develop --desktop=true
          cd "$GITHUB_WORKSPACE"

          WORD_SCRIPTS="src/sdkjs/develop/sdkjs/word/scripts.js"
          if ! grep -q 'word/document/editor\.js' "$WORD_SCRIPTS" 2>/dev/null; then
            echo "Patching word/scripts.js with editor.js..."
            sed -i 's/\];$/,\n\t"..\/..\/..\/..\/sdkjs\/word\/document\/editor.js"\n];/' "$WORD_SCRIPTS"
          fi
          echo "::endgroup::"

      - name: Prepare fonts and AllFonts.js
        run: |
          echo "::group::prepare-fonts"
          pip3 install Pillow --quiet --break-system-packages || pip3 install Pillow --quiet
          chmod +x scripts/prepare-fonts.sh
          bash scripts/prepare-fonts.sh
          echo "::endgroup::"

      - name: Generate Linux icons
        run: |
          echo "::group::generate-icons"
          chmod +x scripts/generate-icons.sh
          bash scripts/generate-icons.sh
          echo "::endgroup::"

      - name: Download x2t Linux binaries
        run: |
          chmod +x scripts/get-x2t-ci.sh
          bash scripts/get-x2t-ci.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy x2t to binaries for DoctRenderer PDF path
        run: |
          cp "src-tauri/binaries/x2t-${{ matrix.target }}" "src-tauri/binaries/x2t"
          echo "x2t resource copy created ($(wc -c < src-tauri/binaries/x2t) bytes)"

      - name: Prepare DoctRenderer resources
        run: |
          echo "::group::Copy fonts to binaries"
          mkdir -p src-tauri/binaries/fonts
          cp src/fonts/*.ttf src-tauri/binaries/fonts/
          cp src/sdkjs/common/AllFonts.js src-tauri/binaries/AllFonts.js
          echo "Fonts copied: $(ls src-tauri/binaries/fonts/*.ttf | wc -l)"
          echo "::endgroup::"

          echo "::group::Compile sdkjs for DoctRenderer"
          SDKJS_UI_REF=$(git -C src/sdkjs rev-parse HEAD)
          DOCTRENDERER_STAGING="$RUNNER_TEMP/doctrenderer-sdkjs"
          restore_sdkjs() {
            git -C src/sdkjs checkout --detach "$SDKJS_UI_REF"
          }
          trap restore_sdkjs EXIT

          rm -f src-tauri/binaries/sdk-all-min.js \
            src-tauri/binaries/sdk-all.js \
            src-tauri/binaries/sdk-word-bundle.js
          rm -rf "$DOCTRENDERER_STAGING"

          git -C src/sdkjs fetch origin tag v8.2.0.147 --no-tags
          git -C src/sdkjs checkout --detach v8.2.0.147
          cd src/sdkjs/build
          npm ci
          npx grunt compile-word --desktop=true --level=SIMPLE --no-color
          cd "$GITHUB_WORKSPACE"

          for bundle in sdk-all-min.js sdk-all.js; do
            source="src/sdkjs/deploy/sdkjs/word/$bundle"
            if [ ! -s "$source" ]; then
              echo "ERROR: Missing compiled DoctRenderer bundle: $source"
              exit 1
            fi
            cp "$source" "src-tauri/binaries/$bundle"
            echo "$bundle: $(wc -c < "$source") bytes"
          done

          mkdir -p "$DOCTRENDERER_STAGING/common/Native"
          mkdir -p "$DOCTRENDERER_STAGING/common/libfont/engine"
          cp src/sdkjs/common/Native/native.js "$DOCTRENDERER_STAGING/common/Native/"
          cp src/sdkjs/common/Native/jquery_native.js "$DOCTRENDERER_STAGING/common/Native/"
          cp src/sdkjs/common/AllFonts.js "$DOCTRENDERER_STAGING/common/"
          cp src/sdkjs/common/libfont/engine/fonts_native.js "$DOCTRENDERER_STAGING/common/libfont/engine/"

          restore_sdkjs
          trap - EXIT
          echo "::endgroup::"

          echo "::group::Create DoctRenderer directory structure"
          chmod +x scripts/prepare-doctrenderer.sh
          DOCTRENDERER_SDKJS="$DOCTRENDERER_STAGING" bash scripts/prepare-doctrenderer.sh
          echo "::endgroup::"

      - name: Stage frontend distribution
        run: |
          echo "::group::prepare-dist"
          chmod +x scripts/prepare-dist.sh
          bash scripts/prepare-dist.sh
          echo "::endgroup::"

      - name: Build Tauri app
        run: |
          set -o pipefail
          npx tauri build \
            --target ${{ matrix.target }} \
            --config '{"bundle":{"targets":["deb"],"icon":["icons/icon.png","icons/128x128.png","icons/128x128@2x.png","icons/32x32.png","icons/256x256.png"],"resources":["binaries/*.so","binaries/*.so.*","binaries/*.config","binaries/*.dat","binaries/*.js","binaries/x2t","binaries/fonts/*","editors/sdkjs/word/*","editors/sdkjs/common/Native/*","editors/sdkjs/common/AllFonts.js","editors/sdkjs/common/libfont/engine/*","editors/web-apps/vendor/xregexp/*","templates/*"]}}' \
            2>&1 | tee /tmp/tauri-build.log

      - name: Verify packaged Linux PDF conversion
        run: |
          DEB=$(find "src-tauri/target/${{ matrix.target }}/release/bundle/deb" -maxdepth 1 -name '*.deb' -print -quit)
          if [ -z "$DEB" ]; then
            echo "ERROR: No .deb found for PDF smoke test"
            exit 1
          fi

          EXTRACTED="$RUNNER_TEMP/euro-office-lite-deb"
          rm -rf "$EXTRACTED"
          mkdir -p "$EXTRACTED"
          dpkg-deb -x "$DEB" "$EXTRACTED"

          SDK_BUNDLE=$(find "$EXTRACTED" -path '*/editors/sdkjs/word/sdk-all-min.js' -print -quit)
          if [ -z "$SDK_BUNDLE" ]; then
            echo "ERROR: sdk-all-min.js not found in packaged .deb"
            exit 1
          fi
          APP_ROOT=${SDK_BUNDLE%/editors/sdkjs/word/sdk-all-min.js}

          chmod +x scripts/smoke-test-linux-pdf-bundle.sh
          bash scripts/smoke-test-linux-pdf-bundle.sh "$APP_ROOT"

      - name: Upload .deb artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installer-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: build-logs-linux-${{ matrix.target }}
          path: /tmp/tauri-build.log

  build-flatpak:
    needs: [build-linux]
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download Linux .deb artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: installer-x86_64-unknown-linux-gnu
          path: deb-download/

      - name: Copy .deb to flatpak dir
        run: |
          ls -la deb-download/
          find deb-download -name '*.deb' -exec cp {} flatpak/euro-office-lite.deb \;

      - name: Install Flatpak and flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          flatpak remote-add --user --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Cache Flatpak runtimes
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: ~/.local/share/flatpak
          key: flatpak-runtime-gnome-49-builder-${{ runner.os }}

      - name: Install GNOME runtime and SDK
        run: |
          flatpak install -y --noninteractive --user flathub org.gnome.Platform//49 org.gnome.Sdk//49

      - name: Import GPG key
        run: |
          echo "${{ secrets.FLATPAK_GPG_KEY }}" | gpg --batch --import
          GPG_KEY_ID=$(gpg --list-secret-keys --keyid-format long | grep sec | head -1 | awk '{print $2}' | cut -d'/' -f2)
          echo "GPG_KEY_ID=$GPG_KEY_ID" >> $GITHUB_ENV

      - name: Build Flatpak
        run: |
          cd flatpak
          flatpak-builder --force-clean --user --repo=repo \
            --gpg-sign=$GPG_KEY_ID \
            --disable-updates \
            build-dir org.eurooffice.Lite.yml

      - name: Update repo metadata
        run: |
          cd flatpak
          flatpak build-update-repo repo \
            --gpg-sign=$GPG_KEY_ID \
            --generate-static-deltas \
            --title="Euro-Office Lite"

      - name: Export GPG public key
        run: gpg --export --armor $GPG_KEY_ID > flatpak/repo/euro-office-flatpak.gpg

      - name: Build single-file bundle
        run: |
          cd flatpak
          flatpak build-bundle repo \
            euro-office-lite.flatpak \
            org.eurooffice.Lite
          ls -lh euro-office-lite.flatpak

      - name: Upload Flatpak bundle artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: installer-flatpak
          path: flatpak/euro-office-lite.flatpak

      - name: Deploy repo to GitHub Pages
        uses: peaceiris/actions-gh-pages@373f7f263a76c20808c831209c920827a82a2847 # v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: flatpak/repo
          destination_dir: repo
          keep_files: false

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-linux, build-flatpak]
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - name: Download all installers
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: installer-*
          merge-multiple: true
          path: installers

      - name: List installers
        run: ls -lh installers/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          name: Euro-Office Lite ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            installers/*.exe
            installers/*.dmg
            installers/*.deb
            installers/*.flatpak
