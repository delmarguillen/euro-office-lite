name: Build & Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  RUST_BACKTRACE: "1"

jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc, aarch64-pc-windows-msvc]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Generate sdkjs develop scripts
        shell: pwsh
        run: |
          echo "::group::grunt-develop"
          Push-Location src\sdkjs\build
          npm ci
          npx grunt develop --desktop=true
          Pop-Location
          $wordScripts = "src\sdkjs\develop\sdkjs\word\scripts.js"
          $content = Get-Content $wordScripts -Raw -Encoding utf8
          if ($content -notmatch 'word/document/editor\.js') {
            Write-Host "Patching word/scripts.js with editor.js..."
            $content = $content -replace '\];$', ",`n`t`"../../../../sdkjs/word/document/editor.js`"`n];"
            Set-Content $wordScripts -Value $content -Encoding utf8 -NoNewline
          }
          echo "::endgroup::"

      - name: Prepare fonts and AllFonts.js
        shell: pwsh
        run: |
          echo "::group::prepare-fonts"
          pip install Pillow --quiet
          .\scripts\prepare-fonts.ps1
          echo "::endgroup::"

      - name: Download x2t binaries
        shell: pwsh
        run: .\scripts\get-x2t-ci.ps1
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename x2t sidecar for target
        if: matrix.target == 'aarch64-pc-windows-msvc'
        shell: pwsh
        run: |
          $bin = "src-tauri\binaries"
          Copy-Item "$bin\x2t-x86_64-pc-windows-msvc.exe" "$bin\x2t-aarch64-pc-windows-msvc.exe"
          Remove-Item "$bin\x2t-x86_64-pc-windows-msvc.exe"

      - name: Stage frontend distribution
        shell: pwsh
        run: |
          echo "::group::prepare-dist"
          .\scripts\prepare-dist.ps1
          echo "::endgroup::"
          $logFile = Join-Path $env:TEMP "euro-office-lite\prepare-dist.log"
          if (Test-Path $logFile) { Get-Content $logFile }

      - name: Build Tauri installer
        shell: pwsh
        run: |
          echo "::group::tauri-build"
          npx tauri build --target ${{ matrix.target }} 2>&1 | Tee-Object -FilePath (Join-Path $env:TEMP "tauri-build.log")
          echo "::endgroup::"

      - name: Show installer info
        shell: pwsh
        run: |
          $nsisDir = "src-tauri\target\${{ matrix.target }}\release\bundle\nsis"
          if (Test-Path $nsisDir) {
            Get-ChildItem $nsisDir -Recurse | Select-Object Name, @{N='Size(MB)';E={[math]::Round($_.Length/1MB,2)}}
          } else {
            Write-Host "NSIS output directory not found at $nsisDir"
            Get-ChildItem "src-tauri\target" -Directory | Select-Object Name
          }

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ matrix.target }}
          path: |
            ${{ runner.temp }}/euro-office-lite/prepare-dist.log
            ${{ runner.temp }}/tauri-build.log

  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [aarch64-apple-darwin]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Generate sdkjs develop scripts
        run: |
          echo "::group::grunt-develop"
          cd src/sdkjs/build
          npm ci
          npx grunt develop --desktop=true
          cd "$GITHUB_WORKSPACE"

          WORD_SCRIPTS="src/sdkjs/develop/sdkjs/word/scripts.js"
          if ! grep -q 'word/document/editor\.js' "$WORD_SCRIPTS" 2>/dev/null; then
            echo "Patching word/scripts.js with editor.js..."
            sed -i '' 's/\];$/,\n\t"..\/..\/..\/..\/sdkjs\/word\/document\/editor.js"\n];/' "$WORD_SCRIPTS"
          fi
          echo "::endgroup::"

      - name: Prepare fonts and AllFonts.js
        run: |
          echo "::group::prepare-fonts"
          pip3 install Pillow --quiet --break-system-packages || pip3 install Pillow --quiet
          chmod +x scripts/prepare-fonts.sh
          bash scripts/prepare-fonts.sh
          echo "::endgroup::"

      - name: Generate macOS icons
        run: |
          echo "::group::generate-icons"
          chmod +x scripts/generate-icons.sh
          bash scripts/generate-icons.sh
          echo "::endgroup::"

      - name: Download x2t macOS binaries
        run: |
          chmod +x scripts/get-x2t-ci.sh
          bash scripts/get-x2t-ci.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fix x2t binary (rpath + ad-hoc re-sign)
        run: |
          echo "::group::Patch x2t rpath and re-sign"
          X2T="src-tauri/binaries/x2t-${{ matrix.target }}"
          if [ -f "$X2T" ]; then
            install_name_tool -add_rpath "@executable_path/../Resources/binaries" "$X2T" 2>/dev/null || true
            codesign --force --sign - "$X2T"
            echo "Updated rpaths:"
            otool -l "$X2T" | grep -A2 LC_RPATH
          fi
          echo "::endgroup::"

      - name: Copy x2t to binaries for DoctRenderer PDF path
        run: |
          cp "src-tauri/binaries/x2t-${{ matrix.target }}" "src-tauri/binaries/x2t"
          echo "x2t resource copy created ($(wc -c < src-tauri/binaries/x2t) bytes)"

      - name: Prepare DoctRenderer resources
        run: |
          echo "::group::Copy fonts to binaries"
          mkdir -p src-tauri/binaries/fonts
          cp src/fonts/*.ttf src-tauri/binaries/fonts/
          cp src/sdkjs/common/AllFonts.js src-tauri/binaries/AllFonts.js
          echo "Fonts copied: $(ls src-tauri/binaries/fonts/*.ttf | wc -l)"
          echo "::endgroup::"

          echo "::group::Generate sdk-word-bundle.js"
          chmod +x scripts/generate-sdk-bundle.sh
          bash scripts/generate-sdk-bundle.sh
          echo "::endgroup::"

          echo "::group::Create DoctRenderer directory structure"
          chmod +x scripts/prepare-doctrenderer.sh
          bash scripts/prepare-doctrenderer.sh
          echo "::endgroup::"

      - name: Stage frontend distribution
        run: |
          echo "::group::prepare-dist"
          chmod +x scripts/prepare-dist.sh
          bash scripts/prepare-dist.sh
          echo "::endgroup::"

      - name: Build Tauri app
        run: |
          set -o pipefail
          npx tauri build \
            --target ${{ matrix.target }} \
            --config '{"bundle":{"targets":["dmg"],"icon":["icons/icon.icns","icons/icon.png","icons/128x128.png","icons/32x32.png"],"resources":["binaries/*.dylib","binaries/*.config","binaries/*.js","binaries/x2t","binaries/fonts/*","binaries/editors/sdkjs/word/*","binaries/editors/sdkjs/common/Native/*","binaries/editors/sdkjs/common/AllFonts.js","binaries/editors/sdkjs/common/libfont/engine/*","binaries/editors/web-apps/vendor/xregexp/*","templates/*"]}}' \
            2>&1 | tee /tmp/tauri-build.log

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-macos-${{ matrix.target }}
          path: /tmp/tauri-build.log

  build-linux:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Diagnose environment
        run: |
          echo "::group::System info"
          uname -a
          lsb_release -a 2>/dev/null || cat /etc/os-release
          echo "Arch: $(uname -m)"
          echo "glibc: $(ldd --version | head -1)"
          echo "::endgroup::"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libssl-dev \
            patchelf \
            python3-pip

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock', 'src-tauri/Cargo.toml') }}
          restore-keys: cargo-${{ runner.os }}-${{ matrix.target }}-

      - name: Install npm dependencies
        run: npm ci

      - name: Generate sdkjs develop scripts
        run: |
          echo "::group::grunt-develop"
          cd src/sdkjs/build
          npm ci
          npx grunt develop --desktop=true
          cd "$GITHUB_WORKSPACE"

          WORD_SCRIPTS="src/sdkjs/develop/sdkjs/word/scripts.js"
          if ! grep -q 'word/document/editor\.js' "$WORD_SCRIPTS" 2>/dev/null; then
            echo "Patching word/scripts.js with editor.js..."
            sed -i 's/\];$/,\n\t"..\/..\/..\/..\/sdkjs\/word\/document\/editor.js"\n];/' "$WORD_SCRIPTS"
          fi
          echo "::endgroup::"

      - name: Prepare fonts and AllFonts.js
        run: |
          echo "::group::prepare-fonts"
          pip3 install Pillow --quiet --break-system-packages || pip3 install Pillow --quiet
          chmod +x scripts/prepare-fonts.sh
          bash scripts/prepare-fonts.sh
          echo "::endgroup::"

      - name: Generate Linux icons
        run: |
          echo "::group::generate-icons"
          chmod +x scripts/generate-icons.sh
          bash scripts/generate-icons.sh
          echo "::endgroup::"

      - name: Download x2t Linux binaries
        run: |
          chmod +x scripts/get-x2t-ci.sh
          bash scripts/get-x2t-ci.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy x2t to binaries for DoctRenderer PDF path
        run: |
          cp "src-tauri/binaries/x2t-${{ matrix.target }}" "src-tauri/binaries/x2t"
          echo "x2t resource copy created ($(wc -c < src-tauri/binaries/x2t) bytes)"

      - name: Prepare DoctRenderer resources
        run: |
          echo "::group::Copy fonts to binaries"
          mkdir -p src-tauri/binaries/fonts
          cp src/fonts/*.ttf src-tauri/binaries/fonts/
          cp src/sdkjs/common/AllFonts.js src-tauri/binaries/AllFonts.js
          echo "Fonts copied: $(ls src-tauri/binaries/fonts/*.ttf | wc -l)"
          echo "::endgroup::"

          echo "::group::Generate sdk-word-bundle.js"
          chmod +x scripts/generate-sdk-bundle.sh
          bash scripts/generate-sdk-bundle.sh
          echo "::endgroup::"

          echo "::group::Create DoctRenderer directory structure"
          chmod +x scripts/prepare-doctrenderer.sh
          bash scripts/prepare-doctrenderer.sh
          echo "::endgroup::"

      - name: Stage frontend distribution
        run: |
          echo "::group::prepare-dist"
          chmod +x scripts/prepare-dist.sh
          bash scripts/prepare-dist.sh
          echo "::endgroup::"

      - name: Build Tauri app
        run: |
          set -o pipefail
          npx tauri build \
            --target ${{ matrix.target }} \
            --config '{"bundle":{"targets":["deb"],"resources":["binaries/*.so","binaries/*.so.*","binaries/*.config","binaries/*.dat","binaries/*.js","binaries/x2t","binaries/fonts/*","binaries/editors/sdkjs/word/*","binaries/editors/sdkjs/common/Native/*","binaries/editors/sdkjs/common/AllFonts.js","binaries/editors/sdkjs/common/libfont/engine/*","binaries/editors/web-apps/vendor/xregexp/*","templates/*"]}}' \
            2>&1 | tee /tmp/tauri-build.log

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-linux-${{ matrix.target }}
          path: /tmp/tauri-build.log

  release:
    needs: [build-windows, build-macos, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          merge-multiple: true
          path: installers

      - name: List installers
        run: ls -lh installers/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Euro-Office Lite ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
          files: |
            installers/*.exe
            installers/*.dmg
            installers/*.deb
