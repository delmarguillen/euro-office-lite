<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=IE8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
  <title>Euro-Office Lite</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
    }

    .start {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      text-align: center;
    }
    .start.hidden { display: none; }

    h1 { font-size: 2rem; font-weight: 300; margin-bottom: 0.5rem; }
    .version { font-size: 0.85rem; color: #6c7086; margin-bottom: 2rem; }
    .actions { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    .btn {
      background: #313244; border: 1px solid #45475a; color: #cdd6f4;
      padding: 1rem 1.5rem; border-radius: 8px; cursor: pointer;
      font-size: 0.95rem; transition: background 0.15s; min-width: 140px;
    }
    .btn:hover { background: #45475a; }
    .btn .icon { font-size: 1.5rem; display: block; margin-bottom: 0.4rem; }

    #placeholder {
      position: absolute; left: 0; top: 0; right: 0; bottom: 0;
      display: none;
    }
    #placeholder.active { display: block; }
  </style>
</head>
<body>
  <div id="start-screen" class="start">
    <div>
      <h1>Euro-Office Lite</h1>
      <p class="version">v0.1.0 — Desktop</p>
      <div class="actions">
        <button class="btn" data-type="word">
          <span class="icon">W</span> Documento
        </button>
        <button class="btn" data-type="cell">
          <span class="icon">X</span> Hoja de cálculo
        </button>
        <button class="btn" data-type="slide">
          <span class="icon">P</span> Presentación
        </button>
        <button class="btn" data-open="true">
          <span class="icon">...</span> Abrir archivo
        </button>
      </div>
    </div>
  </div>

  <div id="placeholder"></div>

  <script src="bridge.js"></script>
  <script>
    // Patch Button.updateHint to tolerate undefined hints (tipSmartPicker etc.)
    // Uses polling because the iframe loads modules asynchronously via require.js
    window._patchButtonHint = function(win) {
      try {
        var checkBtn = setInterval(function() {
          try {
            if (win.Common && win.Common.UI && win.Common.UI.Button) {
              var proto = win.Common.UI.Button.prototype;
              var origUpdateHint = proto.updateHint;
              proto.updateHint = function(hint, isHtml) {
                if (hint === undefined || hint === null) return;
                return origUpdateHint.call(this, hint, isHtml);
              };
              clearInterval(checkBtn);
            }
          } catch(e) { clearInterval(checkBtn); }
        }, 10);
        setTimeout(function() { clearInterval(checkBtn); }, 30000);
      } catch(e) {}
    };
  </script>
  <script src="web-apps/apps/api/documents/api.js"></script>
  <script>
    const startScreen = document.getElementById('start-screen');

    // Recursively inject AscDesktopEditor into all iframes (same-origin)
    function injectBridgeDeep(win) {
      try {
        if (win && !win.AscDesktopEditor) {
          win.AscDesktopEditor = window.AscDesktopEditor;
          win.RendererProcessVariable = window.RendererProcessVariable;
          window._patchButtonHint(win);
        }
      } catch(e) {}
    }

    // Patch createElement to intercept iframe creation and inject bridge early
    var origCreateElement = document.createElement.bind(document);
    document.createElement = function(tag) {
      var el = origCreateElement(tag);
      if (tag.toLowerCase() === 'iframe') {
        var origSrcDescriptor = Object.getOwnPropertyDescriptor(HTMLIFrameElement.prototype, 'src');
        var origSrc = origSrcDescriptor.set;
        var patched = false;

        el.addEventListener('load', function() {
          injectBridgeDeep(el.contentWindow);
          // Also watch for nested iframes
          if (el.contentDocument) {
            var innerObserver = new MutationObserver(function(mutations) {
              mutations.forEach(function(m) {
                m.addedNodes.forEach(function(node) {
                  if (node.tagName === 'IFRAME') {
                    node.addEventListener('load', function() {
                      injectBridgeDeep(node.contentWindow);
                    });
                  }
                });
              });
            });
            innerObserver.observe(el.contentDocument, { childList: true, subtree: true });
          }
        });

        // Inject as soon as contentWindow becomes available
        var checkInterval = setInterval(function() {
          try {
            if (el.contentWindow) {
              injectBridgeDeep(el.contentWindow);
            }
            if (el.contentDocument && el.contentDocument.readyState === 'complete') {
              clearInterval(checkInterval);
            }
          } catch(e) {
            clearInterval(checkInterval);
          }
        }, 10);

        setTimeout(function() { clearInterval(checkInterval); }, 30000);
      }
      return el;
    };

    function openEditor(docType) {
      startScreen.classList.add('hidden');
      document.getElementById('placeholder').classList.add('active');

      new DocsAPI.DocEditor('placeholder', {
        type: 'desktop',
        width: '100%',
        height: '100%',
        documentType: docType,
        document: {
          title: 'Nuevo documento',
          url: '_offline_',
          fileType: docType === 'word' ? 'docx' : docType === 'cell' ? 'xlsx' : 'pptx',
          key: 'local-' + Date.now(),
          permissions: {
            edit: true,
            download: true,
            print: true
          }
        },
        editorConfig: {
          mode: 'edit',
          lang: 'es',
          targetApp: 'desktop',
          user: {
            id: 'local-user',
            name: 'Usuario'
          },
          customization: {
            about: false,
            feedback: false
          }
        },
        events: {
          onAppReady: function() {
            console.log('[EO] Editor app ready');
          },
          onDocumentReady: function() {
            console.log('[EO] Document ready');
          },
          onError: function(event) {
            console.error('[EO] Editor error:', event.data);
          }
        }
      });
    }

    document.querySelectorAll('.btn[data-type]').forEach(function(btn) {
      btn.addEventListener('click', function() {
        openEditor(btn.dataset.type);
      });
    });

    document.querySelector('.btn[data-open]').addEventListener('click', async function() {
      if (window.AscDesktopEditor) {
        await window.AscDesktopEditor.LocalFileOpen();
      }
    });
  </script>
</body>
</html>
